<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px;margin:0 auto;background-color:#0f172a;border-radius:16px;overflow:hidden;border:1px solid #334155;">
  <tr>
    <td style="height:6px;background:#f59e0b;"></td>
  </tr>
  <tr>
    <td style="padding:16px 20px 10px 20px;text-align:center;">
      <img src="https://res.cloudinary.com/dhivn2ahm/image/upload/c_fit,w_380,h_78,q_auto,f_auto/v1774821605/Logo_Forum_1_w3sgmr.png" alt="Forum des Territoires" width="304" height="62" style="width:85%;max-width:304px;height:auto;max-height:78px;object-fit:contain;display:block;margin:0 auto;border:0;outline:none;text-decoration:none;-ms-interpolation-mode:bicubic;" />
    </td>
  </tr>
  <tr>
    <td style="padding:0 24px 8px 24px;text-align:center;">
      <h2 style="margin:0;font-size:24px;color:#f8fafc;font-weight:700;">Badge visiteur</h2>
      <p style="margin:10px 0 0 0;font-size:14px;color:#cbd5e1;line-height:1.5;">{{visitorTagline}}</p>
    </td>
  </tr>
  <tr>
    <td style="padding:8px 24px 20px 24px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#1e293b;border-radius:14px;border:1px solid #475569;">
        <tr>
          <td style="padding:22px 20px;text-align:center;">
            <p style="margin:0 0 6px 0;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;">Nom sur le badge</p>
            <p style="margin:0;font-size:24px;font-weight:700;color:#ffffff;line-height:1.25;">{{fullName}}</p>
            <p style="margin:14px 0 0 0;font-size:14px;color:#e2e8f0;">{{email}}</p>
            {{organizationBlock}}
            {{phoneBlock}}
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding:0 24px 20px 24px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f172a;border-radius:12px;border:1px solid #334155;">
        <tr>
          <td width="50%" style="padding:16px 18px;vertical-align:top;border-right:1px solid #334155;">
            <p style="margin:0 0 4px 0;font-size:10px;color:#94a3b8;text-transform:uppercase;">Formule</p>
            <p style="margin:0;font-size:15px;font-weight:600;color:#f1f5f9;">{{package}}</p>
          </td>
          <td width="50%" style="padding:16px 18px;vertical-align:top;">
            <p style="margin:0 0 4px 0;font-size:10px;color:#94a3b8;text-transform:uppercase;">Personnes</p>
            <p style="margin:0;font-size:15px;font-weight:600;color:#f1f5f9;">{{numberOfPeople}}</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding:0 24px 24px 24px;text-align:center;">
      <p style="margin:0 0 8px 0;font-size:12px;color:#64748b;">Référence badge : <strong style="color:#fbbf24;">{{badgeRef}}</strong></p>
      <p style="margin:0;font-size:12px;color:#64748b;">{{registeredAt}}</p>
      <p style="margin:18px 0 0 0;font-size:13px;color:#cbd5e1;line-height:1.55;">{{instructions}}</p>
      <p style="margin:16px 0 0 0;font-size:12px;color:#94a3b8;">{{pdfNote}}</p>
    </td>
  </tr>
  <tr>
    <td style="height:6px;background:#f59e0b;"></td>
  </tr>
</table>
